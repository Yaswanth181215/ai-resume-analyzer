<!DOCTYPE html>
<html>

<head>

<title>AI Resume Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<div class="card">

<form id="uploadForm" method="POST" enctype="multipart/form-data">

<div class="drop-area" id="dropArea">

<p>Drag & Drop Resume Here</p>
<p>or Click to Upload</p>

<input type="file" name="resume" id="fileInput" required>

</div>

<textarea name="jobdesc" placeholder="Paste Job Description"></textarea>

<button type="submit">Analyze Resume</button>

</form>

<div id="loading" class="loading hidden">
Analyzing Resume...
</div>

{% if score is defined %}

<div class="results">

<h2>Match Score</h2>

<div class="progress">

<div class="progress-bar" style="width: {{score}}%">

{{score}}%

</div>

</div>

<h3>Matched Skills</h3>

<div class="tags">

{% for skill in matched %}

<span class="tag">{{skill}}</span>

{% endfor %}

</div>

<h3>Missing Skills</h3>

<div class="tags">

{% for skill in missing %}

<span class="tag red">{{skill}}</span>

{% endfor %}

</div>

</div>

{% endif %}

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
